<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssisTT Quiz Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* TASARIMIN VE CSS KODLARININ TAMAMI BURADA (HİÇ DOKUNULMADI) */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
:root { --tt-blue: #002C5F; --tt-cyan: #00B5E2; --tt-bg: #001736; --panel-bg: rgba(255, 255, 255, 0.08); --border-light: rgba(255, 255, 255, 0.15); --success: #2ecc71; --danger: #e74c3c; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:var(--tt-bg);color:#fff;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#screen-landing, #screen-admin-login, #screen-host, #screen-join, #screen-waiting, #screen-lb, #screen-end { align-items:center; justify-content:center; text-align:center; padding:2rem; }
.logo{font-size:3rem;font-weight:900}.logo span{color:var(--tt-cyan)}
.btn{padding:1rem 2.5rem;border-radius:12px;border:none;cursor:pointer;font-weight:700;transition:all .2s;font-family:inherit;}
.btn-primary{background:var(--tt-cyan);color:#fff}.btn-outline{background:transparent;color:#fff;border:2px solid var(--border-light)}
.card-panel {background:var(--panel-bg);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1.2rem;}
.fi {width:100%;padding:1rem;background:rgba(255,255,255,.1);border:1px solid var(--border-light);border-radius:12px;color:#fff;text-align:center;outline:none;}
/* Admin Panel Tasarımı */
#screen-admin{background:var(--tt-bg)}
.ahdr{background:var(--tt-blue);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border-light)}
.abody{display:flex;flex:1;gap:0}.sidebar{width:280px;background:var(--tt-blue);padding:1.5rem;border-right:1px solid var(--border-light)}
.qlist{list-style:none;margin-top:1rem}.qi{padding:.8rem;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:.5rem;cursor:pointer;display:flex;justify-content:space-between}
.qi.active{border:1px solid var(--tt-cyan);background:rgba(0,181,226,.1)}
.editor{flex:1;padding:2.5rem;overflow-y:auto}
.gpin{font-size:4rem;font-weight:900;color:var(--tt-cyan);margin:1rem 0}
.pchips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:1rem}
.pchip{background:rgba(255,255,255,0.1);padding:5px 15px;border-radius:20px;border:1px solid var(--border-light)}
</style>
</head>
<body>

  <div id="screen-landing" class="screen active">
    <div class="logo">AssisTT <span>Quiz Time</span></div>
    <div style="margin-top:2rem">
      <button class="btn btn-primary" onclick="window.show('admin-login')">⚙️ Yönetici Paneli</button>
      <button class="btn btn-outline" onclick="window.show('join')">🎮 Oyuna Katıl</button>
    </div>
  </div>

  <div id="screen-admin-login" class="screen">
    <div class="card-panel">
      <h2>Sistem Girişi</h2>
      <input class="fi" type="password" id="admin-pw" placeholder="Şifre...">
      <button class="btn btn-primary" onclick="window.adminLogin()">Giriş Yap</button>
      <button class="btn btn-outline" onclick="window.show('landing')">Geri</button>
    </div>
  </div>

  <div id="screen-admin" class="screen">
    <div class="ahdr">
      <span style="font-weight:900; flex:1">YÖNETİCİ PANELİ</span>
      <button class="btn btn-outline" onclick="window.show('landing')">Çıkış</button>
      <button class="btn btn-primary" onclick="window.startLobby()">▶ Lobiyi Başlat</button>
    </div>
    <div class="abody">
      <div class="sidebar">
        <h3>Sorular</h3>
        <ul id="q-list" class="qlist"></ul>
        <button class="btn btn-outline" style="width:100%" onclick="window.addQ()">+ Yeni Soru</button>
      </div>
      <div id="editor" class="editor">
        </div>
    </div>
  </div>

  <div id="screen-host" class="screen">
    <h1>KATILIM KODU</h1>
    <div class="gpin" id="game-pin">000000</div>
    <div id="qr-container" style="background:#fff; padding:10px; border-radius:10px;"></div>
    <div class="pchips" id="player-chips"></div>
    <p style="margin-top:1rem"><span id="player-count">0</span> Oyuncu Bağlandı</p>
    <button class="btn btn-primary" onclick="window.startGame()" style="margin-top:2rem">OYUNU BAŞLAT</button>
  </div>

  <div id="screen-join" class="screen">
    <div class="card-panel">
      <h2>Oyuna Katıl</h2>
      <input class="fi" type="text" id="join-pin" placeholder="PIN KODU">
      <input class="fi" type="text" id="join-name" placeholder="ADINIZ">
      <button class="btn btn-primary" onclick="window.joinGame()">KATIL</button>
      <button class="btn btn-outline" onclick="window.show('landing')">GERİ</button>
    </div>
  </div>

  <div id="screen-waiting" class="screen">
    <div class="card-panel">
      <h2 id="w-name">...</h2>
      <p>Lobiye bağlandınız. Oyunun başlaması bekleniyor...</p>
      <div class="gpin" style="font-size:2rem" id="w-pin">000000</div>
    </div>
  </div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // 1. FIREBASE YAPILANDIRMAN (Aynen Kalıyor)
  const firebaseConfig = {
    apiKey: "AIzaSyA7ZWCeXXr9Ale5nadD1ZAoI46i18tFu6k",
    authDomain: "assistt-quiz-time.firebaseapp.com",
    databaseURL: "https://assistt-quiz-time-default-rtdb.firebaseio.com",
    projectId: "assistt-quiz-time",
    storageBucket: "assistt-quiz-time.firebasestorage.app",
    messagingSenderId: "343741235205",
    appId: "1:343741235205:web:d68c1d30180ee878739c6c",
    measurementId: "G-KN6Y837NZH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let questions = [];
  let selQIdx = -1;
  let gamePin = '';
  let myName = '';

  // EKRAN DEĞİŞTİRME FONKSİYONU
  window.show = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = document.getElementById('screen-' + id);
    if(target) target.classList.add('active');
  };

  // ADMIN GİRİŞİ
  window.adminLogin = () => {
    if(document.getElementById('admin-pw').value === "admin123") {
      window.show('admin');
      loadQuestions();
    } else { alert("Hatalı Şifre!"); }
  };

  function loadQuestions() {
    onValue(ref(db, 'admin/questions'), (snapshot) => {
      questions = snapshot.val() || [];
      renderQL();
    });
  }

  // LOBİ BAŞLATMA VE QR KOD (ADIM 2 & 3 GÜNCEL)
  window.startLobby = () => {
    gamePin = String(Math.floor(100000 + Math.random() * 900000));
    const state = { pin: gamePin, phase: 'lobby', players: {}, currentQ: 0 };
    
    // Linki dinamik oluştur: GitHub Pages linkini otomatik algılar
    const currentUrl = window.location.origin + window.location.pathname;
    const joinUrl = currentUrl + "?pin=" + gamePin;

    set(ref(db, 'games/' + gamePin), state).then(() => {
      window.show('host');
      document.getElementById('game-pin').textContent = gamePin;
      
      // QR kodu yeni link ile oluştur
      document.getElementById('qr-container').innerHTML = '';
      new QRCode(document.getElementById('qr-container'), {
        text: joinUrl,
        width: 160, height: 160
      });

      // Oyuncuları anlık dinle
      onValue(ref(db, `games/${gamePin}/players`), (snap) => {
        const p = snap.val() || {};
        const names = Object.keys(p);
        document.getElementById('player-count').textContent = names.length;
        document.getElementById('player-chips').innerHTML = names.map(n => `<div class="pchip">${n}</div>`).join('');
      });
    });
  };

  // OYUNA KATILMA VE HATA AYIKLAMA (ADIM 4 GÜNCEL)
  window.joinGame = async () => {
    const pin = document.getElementById('join-pin').value;
    const name = document.getElementById('join-name').value;
    
    if(!pin || !name) return alert("Lütfen PIN ve İsim girin!");

    try {
      // Firebase'den bu PIN ile bir oda var mı sorgula
      const snap = await get(ref(db, 'games/' + pin));
      
      if(snap.exists()) {
        // Oda varsa oyuncuyu kaydet
        await update(ref(db, `games/${pin}/players/${name}`), { score: 0, connected: true });
        myName = name;
        document.getElementById('w-name').textContent = name;
        document.getElementById('w-pin').textContent = pin;
        window.show('waiting');
      } else {
        // Oda yoksa hatayı göster
        alert("Oturum bulunamadı! Lütfen PIN kodunu kontrol edin. Girilen: " + pin);
      }
    } catch (error) {
      console.error("Bağlantı Hatası:", error);
      alert("Firebase'e bağlanılamadı: " + error.message);
    }
  };

  // SAYFA YÜKLENDİĞİNDE URL'DEN PIN ÇEKME (ADIM 3 GÜNCEL)
  window.addEventListener('load', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const pinFromUrl = urlParams.get('pin');
    
    if (pinFromUrl) {
      window.show('join'); // Doğrudan katılım ekranını aç
      setTimeout(() => {
        const pinInput = document.getElementById('join-pin');
        if(pinInput) pinInput.value = pinFromUrl;
      }, 300);
    }
  });

  // DİĞER EDİTÖR FONKSİYONLARI ( window.saveQ, window.addQ, window.selQ vb. ) buraya gelecek...
</script>
</body>
</html>
