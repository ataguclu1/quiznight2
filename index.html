<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssisTT Quiz Time</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* GÖNDERDİĞİN TÜM CSS TASARIMINI BURADA KORUDUM */
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
:root { --tt-blue: #002C5F; --tt-cyan: #00B5E2; --tt-cyan-dark: #008AA8; --tt-bg: #001736; --panel-bg: rgba(255, 255, 255, 0.08); --border-light: rgba(255, 255, 255, 0.15); --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--tt-bg);color:#fff;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}.screen.active{display:flex;flex-direction:column}
#screen-landing, #screen-admin-login, #screen-host, #screen-join, #screen-waiting, #screen-lb, #screen-end { background: linear-gradient(135deg, var(--tt-bg), var(--tt-blue)); align-items:center; justify-content:center; text-align:center; padding:2rem; }
.brand-logo { height: 80px; margin-bottom: 1rem; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.3)); }
.logo{font-size:3rem;font-weight:900;letter-spacing:-1px}.logo span{color:var(--tt-cyan)}
.btn{padding:1rem 2.5rem;border-radius:12px;border:none;cursor:pointer;font-size:1.1rem;font-weight:700;transition:all .2s ease; font-family: inherit;}
.btn-primary{background:var(--tt-cyan);color:#fff;}.btn-outline{background:transparent;color:#fff;border:2px solid var(--border-light)}
.card-panel {background:var(--panel-bg);border:1px solid var(--border-light);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1.2rem;backdrop-filter: blur(10px);}
.fi, .biginp, .ninp {width:100%;padding:1rem 1.2rem;background:rgba(255,255,255,.1);border:1px solid var(--border-light);border-radius:12px;color:#fff;outline:none;text-align:center;}
#screen-admin{background:var(--tt-bg);flex-direction:column}
.ahdr{background:var(--tt-blue);padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border-light);z-index:10;}
.abody{display:flex;flex:1;gap:0;flex-wrap:wrap}
.sidebar{width:280px;background:var(--tt-blue);border-right:1px solid var(--border-light);padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.qlist{list-style:none;display:flex;flex-direction:column;gap:.5rem;max-height:360px;overflow-y:auto}
.qi{padding:.8rem 1rem;background:rgba(255,255,255,.05);border-radius:10px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;gap:.75rem}
.qi.active{border-color:var(--tt-cyan);background:rgba(0,181,226,.15)}
.editor{flex:1;padding:2.5rem;overflow-y:auto; background: var(--tt-bg);}
.fg{margin-bottom:1.2rem}.fg label{display:block;font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:.5rem;text-transform:uppercase;font-weight:600;}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.abox{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:12px;border:2px solid var(--border-light);background: rgba(255,255,255,0.02);}
.abox.correct{border-color:var(--success);background:rgba(46,204,113,.1)}
.gpin{font-size:5rem;font-weight:900;letter-spacing:8px;color:var(--tt-cyan);}
.pchips{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;min-height:50px}
.pchip{padding:.4rem 1.2rem;border-radius:50px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;gap:5px}
/* AVATAR SEÇİMİ */
.av-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem; width:100%; max-width:500px;}
.av-itm{aspect-ratio:1;border-radius:16px;background:rgba(255,255,255,.05);border:3px solid transparent;cursor:pointer;padding:10px;}
.av-itm.sel{border-color:var(--tt-cyan);background:rgba(0,181,226,.15);}
#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:800;display:none}
</style>
</head>
<body>

<div id="screen-landing" class="screen active">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/62/AssisTT_logo.svg/960px-AssisTT_logo.svg.png" class="brand-logo">
  <div class="logo">AssisTT <span>Quiz Time</span></div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="window.show('admin-login')">⚙️ Yönetici Paneli</button>
    <button class="btn btn-outline" onclick="window.show('join')">🎮 Oyuna Katıl</button>
  </div>
</div>

<div id="screen-admin-login" class="screen">
  <div class="card-panel">
    <h2>Sistem Girişi</h2>
    <input class="fi" type="password" id="admin-pw" placeholder="Erişim Şifresi...">
    <button class="btn btn-primary" onclick="window.adminLogin()">Oturum Aç →</button>
    <button class="btn btn-outline" onclick="window.show('landing')">Geri</button>
  </div>
</div>

<div id="screen-admin" class="screen">
  <div class="ahdr">
    <span class="logo" style="font-size:1.3rem; flex:1;">Quiz<span> Time</span></span>
    <button class="btn btn-sm btn-outline" onclick="window.show('landing')">Çıkış</button>
    <button class="btn btn-sm btn-success" onclick="window.startLobby()">▶ Lobiyi Başlat</button>
  </div>
  <div class="abody">
    <div class="sidebar">
      <h3>Soru Havuzu</h3>
      <ul class="qlist" id="q-list"></ul>
      <button class="btn btn-outline btn-sm" onclick="window.addQ()">+ Yeni Soru</button>
    </div>
    <div class="editor" id="editor">
        <p style="text-align:center; color:rgba(255,255,255,0.4); margin-top:5rem;">Soru seçin veya ekleyin.</p>
    </div>
  </div>
</div>

<div id="screen-host" class="screen">
  <div class="gpin" id="game-pin">000000</div>
  <div class="qrbox" id="qr-container" style="background:#fff; padding:10px; border-radius:10px; margin: 20px;"></div>
  <div class="pchips" id="player-chips"></div>
  <button class="btn btn-success" onclick="window.startGame()" style="margin-top:20px">🚀 OYUNU BAŞLAT</button>
</div>

<div id="screen-join" class="screen">
  <div class="card-panel">
    <h2>Oyuna Bağlan</h2>
    <input class="biginp" type="text" id="join-pin" maxlength="6" placeholder="KOD">
    <input class="ninp" type="text" id="join-name" placeholder="ADINIZ">
    <button class="btn btn-primary" onclick="window.joinGame()">Giriş Yap</button>
    <button class="btn btn-outline" onclick="window.show('landing')">Geri</button>
  </div>
</div>

<div id="screen-avatar" class="screen">
  <h2>Karakterini Seç</h2>
  <div class="av-grid" id="grid-avatar-options"></div>
  <button class="btn btn-primary" onclick="window.confirmAvatar()" style="margin-top:20px">Hazırım!</button>
</div>

<div id="screen-waiting" class="screen">
  <div class="logo">AssisTT <span>Quiz Time</span></div>
  <p id="w-name" style="font-size:1.5rem; margin:10px 0;"></p>
  <p>Lobiye bağlandınız. Oyunun başlaması bekleniyor...</p>
</div>

<div id="screen-qhost" class="screen">...</div>
<div id="screen-qplayer" class="screen">...</div>

<canvas id="confetti-canvas"></canvas>

<script type="module">
  // FIREBASE BAĞLANTISI - MODÜL OLARAK BAŞLATILIYOR
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA7ZWCeXXr9Ale5nadD1ZAoI46i18tFu6k",
    authDomain: "assistt-quiz-time.firebaseapp.com",
    databaseURL: "https://assistt-quiz-time-default-rtdb.firebaseio.com",
    projectId: "assistt-quiz-time",
    storageBucket: "assistt-quiz-time.firebasestorage.app",
    messagingSenderId: "343741235205",
    appId: "1:343741235205:web:d68c1d30180ee878739c6c",
    measurementId: "G-KN6Y837NZH"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let questions = [];
  let selQIdx = -1;
  let gamePin = '';
  let myName = '';
  let myAvatar = 'adventurer';

  // --- WINDOW FONKSİYONLARI (BUTONLAR İÇİN) ---
  window.show = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const el = document.getElementById('screen-' + id);
    if(el) el.classList.add('active');
  };

  window.adminLogin = () => {
    if(document.getElementById('admin-pw').value === "admin123") {
      window.show('admin');
      loadQuestions();
    } else { alert("Hatalı!"); }
  };

  // --- SORU YÖNETİMİ ---
  function loadQuestions() {
    onValue(ref(db, 'admin/questions'), (snap) => {
      questions = snap.val() || [];
      renderQL();
    });
  }

  function renderQL() {
    const ul = document.getElementById('q-list');
    ul.innerHTML = questions.map((q, i) => `
      <li class="qi ${i === selQIdx ? 'active' : ''}" onclick="window.selQ(${i})">
        <span>${i + 1}. ${q.text || 'Yeni Soru'}</span>
        <span onclick="window.delQ(event, ${i})">✕</span>
      </li>`).join('');
  }

  window.selQ = (i) => {
    selQIdx = i;
    renderQL();
    const q = questions[i];
    document.getElementById('editor').innerHTML = `
      <div class="fg"><label>Soru Metni</label><textarea class="fi" style="height:80px; text-align:left" id="e-text">${q.text || ''}</textarea></div>
      <div class="ag">
        ${[0, 1, 2, 3].map(j => `
          <div class="abox ${q.answers?.[j]?.correct ? 'correct' : ''}" id="ebox-${j}">
            <input type="text" style="background:transparent;border:none;color:#fff;width:80%" id="e-ans-${j}" value="${q.answers?.[j]?.text || ''}" placeholder="Seçenek ${j + 1}">
            <div onclick="window.setCorrect(${j})" style="cursor:pointer">${q.answers?.[j]?.correct ? '✅' : '⚪'}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:20px" onclick="window.saveQ(${i})">💾 KAYDET</button>
    `;
  };

  window.setCorrect = (j) => {
    if(!questions[selQIdx].answers) questions[selQIdx].answers = [{},{},{},{}];
    questions[selQIdx].answers.forEach((a, idx) => a.correct = (idx === j));
    window.selQ(selQIdx);
  };

  window.saveQ = (i) => {
    const text = document.getElementById('e-text').value;
    const answers = [0, 1, 2, 3].map(j => ({
      text: document.getElementById('e-ans-' + j).value,
      correct: questions[i].answers?.[j]?.correct || false
    }));
    questions[i] = { text, answers, time: 20 };
    set(ref(db, 'admin/questions'), questions).then(() => alert("Soru Kaydedildi!"));
  };

  window.addQ = () => {
    questions.push({ text: '', answers: [{text:'',correct:false},{text:'',correct:false},{text:'',correct:false},{text:'',correct:false}] });
    set(ref(db, 'admin/questions'), questions);
  };

  window.delQ = (e, i) => {
    e.stopPropagation();
    if(confirm('Silinsin mi?')) {
      questions.splice(i, 1);
      set(ref(db, 'admin/questions'), questions);
    }
  };

  // --- OYUN AKIŞI ---
  window.startLobby = () => {
    gamePin = String(Math.floor(100000 + Math.random() * 900000));
    const joinUrl = window.location.origin + window.location.pathname + "?join=" + gamePin;
    set(ref(db, 'games/' + gamePin), { pin: gamePin, phase: 'lobby', players: {} }).then(() => {
      window.show('host');
      document.getElementById('game-pin').textContent = gamePin;
      document.getElementById('qr-container').innerHTML = '';
      new QRCode(document.getElementById('qr-container'), { text: joinUrl, width: 160, height: 160 });
      onValue(ref(db, `games/${gamePin}/players`), (snap) => {
        const p = snap.val() || {};
        document.getElementById('player-chips').innerHTML = Object.keys(p).map(n => `<div class="pchip">${n}</div>`).join('');
      });
    });
  };

  window.joinGame = async () => {
    const pin = document.getElementById('join-pin').value;
    const name = document.getElementById('join-name').value;
    if(!pin || !name) return;
    const snap = await get(ref(db, 'games/' + pin));
    if(snap.exists()) {
      myName = name;
      gamePin = pin;
      window.show('avatar');
      renderAvatarGrid();
    } else { alert("Oda bulunamadı!"); }
  };

  function renderAvatarGrid() {
    const grid = document.getElementById('grid-avatar-options');
    const seeds = ['A','B','C','D','E','F','G','H'];
    grid.innerHTML = seeds.map(s => `
      <div class="av-itm" onclick="window.selAvatarPart('${s}', this)">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${s}" width="100%">
      </div>
    `).join('');
  }

  window.selAvatarPart = (s, el) => {
    myAvatar = s;
    document.querySelectorAll('.av-itm').forEach(i => i.classList.remove('sel'));
    el.classList.add('sel');
  };

  window.confirmAvatar = () => {
    update(ref(db, `games/${gamePin}/players/${myName}`), { score: 0, avatar: myAvatar });
    document.getElementById('w-name').textContent = myName;
    window.show('waiting');
  };

  // URL'den Otomatik PIN Alma
  window.addEventListener('load', () => {
    const pin = new URLSearchParams(window.location.search).get('join');
    if(pin) {
      window.show('join');
      setTimeout(() => document.getElementById('join-pin').value = pin, 500);
    }
  });

</script>
</body>
</html>
